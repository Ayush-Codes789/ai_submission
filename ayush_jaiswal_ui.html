<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 50px; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 600px; }
        .chat-header { background: #2563eb; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; font-weight: bold; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #2563eb; color: white; align-self: flex-end; }
        .ai-msg { background: #e5e7eb; color: black; align-self: flex-start; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Chatbot</div>
    <div class="chat-history" id="chat-history">
        
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Generate a random thread ID for this browser session to test memory
    const threadId = "thread_" + Math.random().toString(36).substring(7);

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        // Display User Message
        appendMessage(message, "user-msg");
        inputField.value = "";

        // Send to FastAPI Backend
        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, thread_id: threadId })
            });
            
            const data = await response.json();
            // Display AI Message
            appendMessage(data.response, "ai-msg");
        } catch (error) {
            appendMessage("Error: Could not connect to the server.", "ai-msg");
        }
    }

    function appendMessage(text, className) {
        const chatHistory = document.getElementById("chat-history");
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + className;
        msgDiv.textContent = text;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight; // Auto-scroll
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
